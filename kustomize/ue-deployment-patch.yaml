apiVersion: apps/v1
kind: Deployment
metadata:
  name: free5gc-zebra-ueransim-ue
spec:
  template:
    spec:
      containers:
        - name: phone-proxy
          image: ghcr.io/infinitydon/ueransim-phone:v0.2.1
          imagePullPolicy: IfNotPresent
          env:
            - name: UE_TUN_PATTERN
              value: "uesimtun*"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: phone
          image: lscr.io/linuxserver/chromium:bf9e0b4f-ls46
          imagePullPolicy: IfNotPresent
          env:
            - name: TITLE
              value: "UERANSIM Phone"
            - name: CHROME_CLI
              value: "--kiosk --proxy-server=socks5://127.0.0.1:1080 https://example.com"
            - name: SELKIES_MANUAL_WIDTH
              value: "390"
            - name: SELKIES_MANUAL_HEIGHT
              value: "844"
            - name: MAX_RES
              value: "390x844"
            - name: NO_DECOR
              value: "true"
            - name: HARDEN_DESKTOP
              value: "true"
            - name: HARDEN_OPENBOX
              value: "true"
            - name: DISABLE_IPV6
              value: "true"
            - name: SELKIES_UI_TITLE
              value: "UERANSIM Phone"
            - name: SELKIES_UI_SHOW_LOGO
              value: "false|locked"
            - name: SELKIES_UI_SIDEBAR_SHOW_FILES
              value: "false|locked"
            - name: SELKIES_UI_SIDEBAR_SHOW_APPS
              value: "false|locked"
          ports:
            - name: phone-http
              containerPort: 3000
              protocol: TCP
            - name: phone-https
              containerPort: 3001
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: phone-https
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
